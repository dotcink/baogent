# baogent 配置示例
# 复制此文件并填入实际值，例如：
#   cp config/example.toml config/.local.toml
#   bun run cli chat "hello"

[model]
provider = "openai"
apiKey  = "your-api-key"
baseURL = "https://ark.cn-beijing.volces.com/api/v3"
model   = "doubao-seed-2-0-code-preview-260215"
